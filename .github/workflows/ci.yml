name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: bash scripts/check-tsc.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  schema-drift:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check schema drift
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' }}
        run: bash scripts/check-schema-drift.sh
      - name: Skip schema drift (no Supabase credentials)
        if: ${{ env.SUPABASE_ACCESS_TOKEN == '' }}
        run: 'echo "SKIP schema-drift: SUPABASE_ACCESS_TOKEN unavailable (Dependabot/fork PRs have no access to Actions secrets). Enforced on internal PRs and on push to main."'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint src

  tenant-table-requirements:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Check tenant table requirements
        if: ${{ env.SUPABASE_DB_URL != '' }}
        run: bash scripts/check-tenant-table-requirements.sh
      - name: Skip tenant table requirements (no Supabase credentials)
        if: ${{ env.SUPABASE_DB_URL == '' }}
        run: 'echo "SKIP tenant-table-requirements: SUPABASE_DB_URL unavailable (Dependabot/fork PRs have no access to Actions secrets). Enforced on internal PRs and on push to main."'

  migration-manifest:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Check migration manifest
        if: ${{ env.SUPABASE_DB_URL != '' }}
        run: bash scripts/check-migration-manifest.sh
      - name: Skip migration manifest (no Supabase credentials)
        if: ${{ env.SUPABASE_DB_URL == '' }}
        run: 'echo "SKIP migration-manifest: SUPABASE_DB_URL unavailable (Dependabot/fork PRs have no access to Actions secrets). Enforced on internal PRs and on push to main."'

  from-table-names:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-from-table-names.sh

  country-config-completeness:
    runs-on: ubuntu-latest
    # Phase 0: report-only until §10a country population; flip to required then
    # (remove continue-on-error) once unprepared countries are set is_active=false.
    continue-on-error: true
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Check active-country config completeness (no stubs)
        if: ${{ env.SUPABASE_DB_URL != '' }}
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/check-active-country-config.sql
      - name: Skip active-country config check (no Supabase credentials)
        if: ${{ env.SUPABASE_DB_URL == '' }}
        run: 'echo "SKIP country-config-completeness: SUPABASE_DB_URL unavailable (Dependabot/fork PRs have no access to Actions secrets). Enforced on internal PRs and on push to main."'

  token-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-tokens.sh
